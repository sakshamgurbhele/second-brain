<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes — Second Brain</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f1117; --surface: #161b22; --border: #21293a;
            --accent: #58a6ff; --accent-dim: rgba(88,166,255,0.12);
            --text: #e6edf3; --text-muted: #8b949e; --text-faint: #30363d;
            --radius: 6px; --font-mono: 'SFMono-Regular', Consolas, monospace;
        }
        html[data-theme="light"] {
            --bg: #f6f8fa; --surface: #ffffff; --border: #d0d7de;
            --accent: #0969da; --text: #1f2328; --text-muted: #656d76; --text-faint: #8c959f;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: grid; grid-template-columns: 220px 1fr; }
        .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 24px 0; display: flex; flex-direction: column; gap: 2px; position: sticky; top: 0; height: 100vh; }
        .sidebar-logo { padding: 0 20px 20px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
        .sidebar-logo h2 { font-size: 15px; font-weight: 600; }
        .sidebar-logo span { font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 20px; font-size: 14px; color: var(--text-muted); text-decoration: none; border-left: 2px solid transparent; transition: all 0.15s; }
        .nav-item.active { color: var(--text); background: var(--accent-dim); border-left-color: var(--accent); }
        .nav-item svg { flex-shrink: 0; opacity: 0.7; }
        .nav-item.active svg { opacity: 1; }
        .sidebar-footer { margin-top: auto; padding: 16px 20px 0; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-faint); font-family: var(--font-mono); }
        .main { display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
        .empty-msg { font-size: 14px; color: var(--text-faint); font-family: var(--font-mono); }
        .new-btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo"><h2>Second Brain</h2><span>personal workspace</span></div>
        <a class="nav-item" href="{% url 'index' %}">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M2 2h5v5H2V2zm7 0h5v5H9V2zM2 9h5v5H2V9zm7 0h5v5H9V9z"/></svg>
            All Tasks
        </a>
        <a class="nav-item active" href="{% url 'notes_list' %}">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="1"/><path d="M5 5h6M5 8h6M5 11h4"/></svg>
            Notes
        </a>
        <div class="sidebar-footer">
            <div style="margin-bottom:8px;color:var(--text-muted);">{{ request.user.username }}</div>
            <form method="post" action="{% url 'logout' %}">{% csrf_token %}
                <button type="submit" style="background:none;border:none;color:var(--text-faint);font-size:11px;font-family:var(--font-mono);cursor:pointer;padding:0;">sign out</button>
            </form>
        </div>
    </aside>
    <main class="main">
        <p class="empty-msg">// no notes yet</p>
        <form method="post" action="{% url 'note_create' %}">{% csrf_token %}
            <button class="new-btn" type="submit">+ New Note</button>
        </form>
    </main>
    <script>
        const html = document.documentElement;
        const saved = localStorage.getItem('theme') || 'dark';
        html.setAttribute('data-theme', saved);
    </script>
</body>
</html>
