<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notepad — Second Brain</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f1117;
            --surface: #161b22;
            --surface-2: #1c2230;
            --border: #21293a;
            --accent: #58a6ff;
            --accent-dim: rgba(88,166,255,0.12);
            --text: #e6edf3;
            --text-muted: #8b949e;
            --text-faint: #30363d;
            --danger: #f85149;
            --radius: 6px;
            --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        }

        html[data-theme="light"] {
            --bg: #f6f8fa;
            --surface: #ffffff;
            --surface-2: #f0f2f5;
            --border: #d0d7de;
            --accent: #0969da;
            --accent-dim: rgba(9,105,218,0.08);
            --text: #1f2328;
            --text-muted: #656d76;
            --text-faint: #8c959f;
            --danger: #d1242f;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: grid;
            grid-template-columns: 220px 1fr;
        }

        /* Sidebar */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 24px 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .sidebar-logo {
            padding: 0 20px 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 12px;
        }

        .sidebar-logo h2 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 0.5px;
        }

        .sidebar-logo span {
            font-size: 12px;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        .nav-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--text-faint);
            text-transform: uppercase;
            padding: 8px 20px 4px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 20px;
            font-size: 14px;
            color: var(--text-muted);
            cursor: pointer;
            border-left: 2px solid transparent;
            text-decoration: none;
            transition: all 0.15s;
        }

        .nav-item:hover { color: var(--text); }

        .nav-item.active {
            color: var(--text);
            background: var(--accent-dim);
            border-left-color: var(--accent);
        }

        .nav-item svg { flex-shrink: 0; opacity: 0.7; }
        .nav-item.active svg { opacity: 1; }

        .sidebar-footer {
            margin-top: auto;
            padding: 16px 20px 0;
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-faint);
            font-family: var(--font-mono);
        }

        /* Main */
        .main {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 48px 48px 32px;
        }

        .page-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-shrink: 0;
        }

        .page-header h1 {
            font-size: 26px;
            font-weight: 600;
        }

        .save-status {
            font-size: 12px;
            color: var(--text-faint);
            font-family: var(--font-mono);
            transition: color 0.3s;
        }

        .save-status.saving { color: var(--accent); }
        .save-status.saved  { color: var(--text-muted); }

        textarea {
            flex: 1;
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            resize: none;
            color: var(--text);
            font-size: 15px;
            line-height: 1.8;
            font-family: inherit;
            caret-color: var(--accent);
        }

        textarea::placeholder { color: var(--text-faint); }

        @media (max-width: 640px) {
            body { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .main { padding: 20px 16px 90px; }
            textarea { font-size: 16px; }
        }

        .mobile-nav { display: none; }
        @media (max-width: 640px) {
            .mobile-nav {
                display: flex;
                position: fixed;
                bottom: 0; left: 0; right: 0;
                background: var(--surface);
                border-top: 1px solid var(--border);
                z-index: 100;
            }
            .mobile-nav a {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 4px;
                padding: 10px 0 14px;
                text-decoration: none;
                color: var(--text-muted);
                font-size: 10px;
                font-weight: 500;
                transition: color 0.15s;
            }
            .mobile-nav a.active { color: var(--accent); }
            .mobile-nav a svg { width: 20px; height: 20px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-logo">
            <h2>Second Brain</h2>
            <span>personal workspace</span>
        </div>

        <span class="nav-label">Views</span>
        <a class="nav-item" href="{% url 'index' %}">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                <path d="M2 2h5v5H2V2zm7 0h5v5H9V2zM2 9h5v5H2V9zm7 0h5v5H9V9z"/>
            </svg>
            All Tasks
        </a>
        <a class="nav-item active" href="{% url 'notepad' %}">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="2" y="2" width="12" height="12" rx="1"/>
                <path d="M5 5h6M5 8h6M5 11h4"/>
            </svg>
            Notepad
        </a>

        <div class="sidebar-footer">
            <div style="margin-bottom:8px; color: var(--text-muted);">{{ request.user.username }}</div>
            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit" style="background:none;border:none;color:var(--text-faint);font-size:11px;font-family:var(--font-mono);cursor:pointer;padding:0;">sign out</button>
                </form>
                <button id="theme-toggle" title="Toggle light/dark" style="background:none;border:1px solid var(--border);color:var(--text-muted);font-size:13px;cursor:pointer;padding:3px 7px;border-radius:4px;line-height:1;">☀</button>
            </div>
            <div>{% now "Y-m-d" %}</div>
        </div>
    </aside>

    <main class="main">
        <div class="page-header">
            <h1>Notepad</h1>
            <span class="save-status" id="status">// dump your thoughts here</span>
        </div>
        <textarea id="pad" placeholder="Start typing…">{{ pad.content }}</textarea>
    </main>

    <script>
        // Theme toggle
        const html = document.documentElement;
        const btn = document.getElementById('theme-toggle');
        const saved = localStorage.getItem('theme') || 'dark';
        function applyTheme(t) {
            html.setAttribute('data-theme', t);
            btn.textContent = t === 'dark' ? '☀' : '☾';
        }
        applyTheme(saved);
        btn.addEventListener('click', () => {
            const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', next);
            applyTheme(next);
        });

        const pad = document.getElementById('pad');
        const status = document.getElementById('status');
        let timer;

        pad.addEventListener('input', () => {
            clearTimeout(timer);
            status.textContent = '// unsaved';
            status.className = 'save-status saving';
            timer = setTimeout(save, 800);
        });

        async function save() {
            status.textContent = '// saving…';
            const body = new FormData();
            body.append('content', pad.value);
            body.append('csrfmiddlewaretoken', '{{ csrf_token }}');
            const res = await fetch('{% url "notepad" %}', { method: 'POST', body });
            const data = await res.json();
            status.textContent = `// saved at ${data.updated_at}`;
            status.className = 'save-status saved';
        }
    </script>

    <nav class="mobile-nav">
        <a href="{% url 'index' %}">
            <svg viewBox="0 0 16 16" fill="currentColor"><path d="M2 2h5v5H2V2zm7 0h5v5H9V2zM2 9h5v5H2V9zm7 0h5v5H9V9z"/></svg>
            Tasks
        </a>
        <a href="{% url 'notepad' %}" class="active">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="1"/><path d="M5 5h6M5 8h6M5 11h4"/></svg>
            Notepad
        </a>
        <form method="post" action="{% url 'logout' %}" style="flex:1;">
            {% csrf_token %}
            <button type="submit" style="width:100%;height:100%;background:none;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:10px 0 14px;color:var(--text-muted);font-size:10px;font-weight:500;cursor:pointer;">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="20" height="20"><path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M10 11l3-3-3-3M13 8H6"/></svg>
                Sign out
            </button>
        </form>
    </nav>
</body>
</html>
