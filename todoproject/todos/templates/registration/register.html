<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Second Brain</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f1117;
            --surface: #161b22;
            --border: #21293a;
            --accent: #58a6ff;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --text-faint: #30363d;
            --danger: #f85149;
            --radius: 6px;
            --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card { width: 100%; max-width: 360px; }
        .card-header { margin-bottom: 32px; }
        .card-header h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
        .card-header p { font-size: 13px; color: var(--text-muted); font-family: var(--font-mono); }
        .field { margin-bottom: 16px; }
        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--accent); }
        .hint {
            font-size: 11px;
            color: var(--text-faint);
            margin-top: 5px;
            font-family: var(--font-mono);
        }
        .field-errors {
            font-size: 12px;
            color: var(--danger);
            margin-top: 5px;
        }
        .btn {
            width: 100%;
            padding: 11px;
            background: var(--accent);
            color: #0f1117;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
            margin-top: 8px;
        }
        .btn:hover { opacity: 0.85; }
        .footer-link {
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
        }
        .footer-link a { color: var(--accent); text-decoration: none; }
        .footer-link a:hover { text-decoration: underline; }
        .logo { font-family: var(--font-mono); font-size: 12px; color: var(--text-faint); margin-bottom: 40px; }
    </style>
</head>
<body>
    <div class="card">
        <p class="logo">// second-brain</p>
        <div class="card-header">
            <h1>Create account</h1>
            <p>start capturing your thoughts</p>
        </div>

        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="field">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}<p class="hint">{{ field.help_text }}</p>{% endif %}
                {% for error in field.errors %}<p class="field-errors">{{ error }}</p>{% endfor %}
            </div>
            {% endfor %}
            <button class="btn" type="submit">Create account</button>
        </form>

        <p class="footer-link">Already have an account? <a href="{% url 'login' %}">Sign in</a></p>
    </div>
</body>
</html>
