<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Second Brain</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f1117;
            --surface: #161b22;
            --border: #21293a;
            --accent: #58a6ff;
            --accent-dim: rgba(88,166,255,0.12);
            --text: #e6edf3;
            --text-muted: #8b949e;
            --text-faint: #30363d;
            --danger: #f85149;
            --radius: 6px;
            --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            width: 100%;
            max-width: 360px;
        }
        .card-header {
            margin-bottom: 32px;
        }
        .card-header h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .card-header p {
            font-size: 13px;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }
        .field {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--accent); }
        .errors {
            background: rgba(248,81,73,0.1);
            border: 1px solid rgba(248,81,73,0.3);
            border-radius: var(--radius);
            padding: 10px 12px;
            margin-bottom: 16px;
            font-size: 13px;
            color: var(--danger);
        }
        .btn {
            width: 100%;
            padding: 11px;
            background: var(--accent);
            color: #0f1117;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
            margin-top: 8px;
        }
        .btn:hover { opacity: 0.85; }
        .footer-link {
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
        }
        .footer-link a {
            color: var(--accent);
            text-decoration: none;
        }
        .footer-link a:hover { text-decoration: underline; }
        .logo {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-faint);
            margin-bottom: 40px;
        }
    </style>
</head>
<body>
    <div class="card">
        <p class="logo">// second-brain</p>
        <div class="card-header">
            <h1>Second Brain</h1>
            <p>enter your password to continue</p>
        </div>

        {% if error == 'locked' %}
        <div class="errors">Too many failed attempts. Try again in 1 hour.</div>
        {% elif error %}
        <div class="errors">Incorrect password.</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="field">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" autocomplete="current-password" autofocus>
            </div>
            <button class="btn" type="submit">Enter</button>
        </form>

    </div>
</body>
</html>
